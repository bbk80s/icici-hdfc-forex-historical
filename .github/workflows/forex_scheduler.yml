name: Daily Forex Archiver

on:
  schedule:
    # 04:30 UTC is 10:00 AM IST & 10:30 UTC is 04:00 PM IST
    - cron: '30 4 * * *'
    - cron: '30 10 * * *'
  workflow_dispatch: # Allows you to manually trigger the workflow testing whenever you want

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-node-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install requests beautifulsoup4 pytz

    - name: Run Fetch Script
      run: python fetch_rates.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add .
        # Only commit if changes exist, preventing automated workflow errors
        git diff-index --quiet HEAD || git commit -m "Automated Archive: $(date)"
        git push
