name: Daily Forex Archiver

on:
  schedule:
    # 04:30 UTC is 10:00 AM IST & 10:30 UTC is 04:00 PM IST
    - cron: '30 4 * * *'
    - cron: '30 10 * * *'
  workflow_dispatch: # Allows manual trigger

# Explicitly grant top-level permission to push file updates
permissions:
  contents: write

jobs:
  archive:
    runs-on: ubuntu-latest
      
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        # Ensures git fetches complete histories rather than a shallow clone
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install requests beautifulsoup4 pytz

    - name: Run Fetch Script
      run: python fetch_rates.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # 1. Fetch latest changes from remote just in case another runner pushed
        git fetch origin main
        
        # 2. Stage changes
        git add .
        
        # 3. Only commit if there are actual new files/changes
        if ! git diff-index --quiet HEAD; then
          git commit -m "Automated Archive: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          
          # 4. Pull any incoming remote changes with rebase to prevent non-fast-forward errors
          git pull origin main --rebase
          
          # 5. Push safely
          git push origin main
        else
          echo "No historical rate changes detected to archive today."
        fi
